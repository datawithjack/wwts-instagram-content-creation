# Content Calendar — WWT Instagram
# Categories:
#   evergreen  — historical stats, post anytime
#   seasonal   — current/recent season data, refreshes each year
#   recurring  — auto-posted on a schedule (e.g. site stats weekly)
#
# Themed days (future):
#   wave_wednesday, foil_friday, forward_friday, slalom_saturday

posts:
