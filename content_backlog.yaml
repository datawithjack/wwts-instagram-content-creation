# Content Backlog — WWT Instagram
#
# Planning document for upcoming posts. Each post has a scheduled_date for
# hands-off publishing via Meta's scheduled_publish_time API.
#
# Usage:
#   python schedule.py --calendar content_backlog.yaml --publish schedule
#   (reads scheduled_date from each post — no --schedule-start needed)
#
# Fields:
#   id:             Unique post identifier
#   template:       Template name (top_10, head_to_head, h2h_carousel, rider_profile, site_stats, canary_kings, athlete_rise)
#   params:         Template-specific parameters (score_type, sex, year, event, athlete1, athlete2, division, etc.)
#   caption:        Instagram caption text (optional — auto-generated if omitted)
#   category:       evergreen | seasonal | recurring
#   scheduled_date: Publish date/time in ISO 8601 UTC (e.g. 2026-03-25T12:00:00) — REQUIRED for scheduling
#   notes:          Planning notes (not used by scheduler, just for reference)

