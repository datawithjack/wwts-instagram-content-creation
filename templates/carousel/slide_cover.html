{% extends "base.html" %}

{% block head %}
<style>
    {% if discipline == 'jumps' %}
    --accent: var(--color-athlete-right);
    {% else %}
    --accent: var(--color-athlete-left);
    {% endif %}

    .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px 60px;
    }

    .badge {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: {% if discipline == 'jumps' %}var(--color-athlete-right){% else %}var(--color-athlete-left){% endif %};
        margin-bottom: 32px;
        padding: 8px 24px;
        border: 1px solid {% if discipline == 'jumps' %}rgba(45,212,191,0.3){% else %}rgba(56,189,248,0.3){% endif %};
        border-radius: 4px;
    }

    .cover-title {
        font-family: var(--font-display);
        font-size: 96px;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 0.95;
        margin-bottom: 24px;
    }

    .cover-title .gender {
        color: {% if discipline == 'jumps' %}var(--color-athlete-right){% else %}var(--color-athlete-left){% endif %};
    }

    .cover-year {
        font-family: var(--font-display);
        font-size: 160px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1;
        color: {% if discipline == 'jumps' %}var(--color-athlete-right){% else %}var(--color-athlete-left){% endif %};
        opacity: 0.15;
        position: absolute;
        bottom: 60px;
        right: 60px;
    }

    .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, {% if discipline == 'jumps' %}var(--color-athlete-right){% else %}var(--color-athlete-left){% endif %}, transparent);
        margin: 24px auto;
        border-radius: 2px;
    }

    .cover-subtitle {
        font-family: var(--font-body);
        font-size: 16px;
        font-weight: 400;
        color: var(--color-text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .swipe-hint {
        position: absolute;
        bottom: 40px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: var(--font-body);
        font-size: 13px;
        color: rgba(255,255,255,0.25);
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .swipe-hint::after {
        content: ' →';
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="badge">{{ discipline | upper }}</div>
    <div class="cover-title">
        <span class="gender">{{ title_gender | upper }}</span><br>
        TOP 10<br>
        {{ title_metric | upper }}
    </div>
    <div class="divider"></div>
    <div class="cover-subtitle">{{ year }} Season</div>
    <div class="cover-year">{{ year }}</div>
    <div class="swipe-hint">Swipe to reveal</div>
</div>
{% endblock %}
