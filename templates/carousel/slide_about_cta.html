{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: center;
        justify-content: space-evenly;
        text-align: center;
        padding: 120px 64px;
    }

    .cta-title {
        font-family: var(--font-display);
        font-size: 88px;
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--color-text-primary);
        white-space: nowrap;
    }

    .cta-url {
        font-family: var(--font-display);
        font-size: 52px;
        letter-spacing: 0.03em;
        color: var(--color-discipline);
    }

    .cta-follow {
        font-family: var(--font-body);
        font-size: 24px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--color-text-muted);
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="cta-title">FOLLOW FOR WEEKLY STATS</div>
    <div class="cta-url">windsurfworldtourstats.com</div>
    <div class="cta-follow">{{ handle }} · Follow for more</div>
</div>
{% endblock %}
