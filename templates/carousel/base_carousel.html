{% extends "base.html" %}

{% block head %}
<style>
    /* ── Shared carousel variables ── */
    :root {
        --color-discipline: {{ accent_color | default('#00D4FF') }};
    }

    /* ── Shared carousel styles ── */
    .eyebrow {
        font-family: var(--font-body);
        font-size: 28px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--color-discipline);
        margin-bottom: 8px;
    }

    .slide-title {
        font-family: var(--font-display);
        font-size: 100px;
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--color-text-primary);
        margin-bottom: 12px;
    }

    .position-pill {
        display: inline-block;
        font-family: var(--font-display);
        background: var(--color-discipline);
        color: #0E1927;
        border-radius: 6px;
        padding: 6px 20px;
        font-size: 44px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-bottom: 24px;
    }

    .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .carousel-footer {
        position: absolute;
        bottom: 24px;
        right: 32px;
        font-family: var(--font-body);
        font-size: 16px;
        font-weight: 500;
        color: rgba(255,255,255,0.20);
        letter-spacing: 0.04em;
        z-index: 10;
    }
</style>
{% block carousel_head %}{% endblock %}
{% endblock %}

{% block content %}
{% block carousel_content %}{% endblock %}
{% if not hide_footer %}
<div class="carousel-footer">windsurfworldtourstats.com</div>
{% endif %}
{% endblock %}
