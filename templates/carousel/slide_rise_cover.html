{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        flex-direction: row;
        align-items: stretch;
        padding: 0;
        gap: 0;
    }

    /* ── Photo side (left 40%) ── */
    .photo-side {
        width: 40%;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(20, 28, 45, 0.6);
    }

    .photo-side img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
    }

    .photo-side .photo-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 200px;
        color: rgba(255,255,255,0.15);
    }

    /* Gradient fade on right edge of photo */
    .photo-side::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 80px;
        height: 100%;
        background: linear-gradient(to right, transparent, var(--color-bg));
    }

    /* ── Text side (right 60%) ── */
    .text-side {
        width: 60%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 48px 44px 48px 32px;
        text-align: left;
    }

    .eyebrow {
        margin-bottom: 24px;
    }

    .cover-prefix {
        font-family: var(--font-display);
        font-size: 140px;
        letter-spacing: 0.02em;
        line-height: 0.92;
        color: var(--color-text-primary);
    }

    .cover-name {
        font-family: var(--font-display);
        font-size: 180px;
        letter-spacing: 0.02em;
        line-height: 0.88;
        color: var(--color-discipline);
        margin: 10px 0;
    }

    .cover-location {
        font-family: var(--font-display);
        font-size: 120px;
        letter-spacing: 0.02em;
        line-height: 0.92;
        color: var(--color-text-primary);
    }

    .divider {
        margin: 24px 0 0;
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="photo-side">
        {% if athlete_photo_url %}
        <img src="{{ athlete_photo_url }}" alt="{{ cover_name }}">
        {% else %}
        <div class="photo-placeholder">{{ cover_name[0] if cover_name else 'A' }}</div>
        {% endif %}
    </div>

    <div class="text-side">
        <div class="eyebrow">{{ eyebrow }}</div>

        <div class="cover-prefix" data-autofit>THE RISE OF</div>
        <div class="cover-name" data-autofit>{{ cover_name }}</div>
        <div class="cover-location" data-autofit>{{ cover_location }}</div>

        <div class="divider"></div>
    </div>
</div>
<script>
document.fonts.ready.then(() => {
    document.querySelectorAll('[data-autofit]').forEach(el => {
        const maxWidth = el.parentElement.offsetWidth - 76; /* account for padding */
        let size = parseInt(getComputedStyle(el).fontSize);
        while (el.scrollWidth > maxWidth && size > 40) {
            size -= 4;
            el.style.fontSize = size + 'px';
        }
    });
});
</script>
{% endblock %}
