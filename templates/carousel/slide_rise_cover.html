{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 44px;
        gap: 0;
    }

    .eyebrow {
        font-family: var(--font-body);
        font-size: 30px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--color-discipline);
        margin-bottom: 20px;
    }

    .cover-prefix {
        font-family: var(--font-display);
        font-size: 180px;
        letter-spacing: 0.02em;
        line-height: 0.92;
        color: var(--color-text-primary);
    }

    .cover-name {
        font-family: var(--font-display);
        font-size: 240px;
        letter-spacing: 0.02em;
        line-height: 0.88;
        color: var(--color-discipline);
        margin: 10px 0;
    }

    .cover-location {
        font-family: var(--font-display);
        font-size: 180px;
        letter-spacing: 0.02em;
        line-height: 0.92;
        color: var(--color-text-primary);
    }

    .divider {
        width: 120px;
        height: 4px;
        background: linear-gradient(90deg, var(--color-discipline), transparent);
        margin: 28px auto 0;
        border-radius: 2px;
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="eyebrow">{{ eyebrow }}</div>

    <div class="cover-prefix" data-autofit>THE RISE OF</div>
    <div class="cover-name" data-autofit>{{ cover_name }}</div>
    <div class="cover-location" data-autofit>{{ cover_location }}</div>

    <div class="divider"></div>
</div>
<script>
document.fonts.ready.then(() => {
    document.querySelectorAll('[data-autofit]').forEach(el => {
        const maxWidth = el.parentElement.offsetWidth;
        let size = parseInt(getComputedStyle(el).fontSize);
        while (el.scrollWidth > maxWidth && size > 40) {
            size -= 4;
            el.style.fontSize = size + 'px';
        }
    });
});
</script>
{% endblock %}
