{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: center;
        justify-content: space-evenly;
        text-align: center;
        padding: 120px 64px;
    }

    .cta-headline {
        font-family: var(--font-body);
        font-size: 32px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--color-text-muted);
    }

    .cta-url {
        font-family: var(--font-display);
        font-size: 96px;
        letter-spacing: 0.03em;
        line-height: 1.1;
        color: var(--color-discipline);
    }

    .cta-follow {
        font-family: var(--font-body);
        font-size: 32px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--color-text-muted);
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="cta-headline">See the full Top 10 at...</div>
    <div class="cta-url">windsurfworldtourstats.com</div>
    <div class="cta-follow">@windsurfworldtourstats · Follow for more</div>
</div>
{% endblock %}
