{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 120px 64px;
        gap: 44px;
    }

    .accent-line {
        width: 80px;
        height: 4px;
        background: var(--color-discipline);
        border-radius: 2px;
    }

    .cta-headline {
        font-family: var(--font-display);
        font-size: 100px;
        letter-spacing: 0.02em;
        line-height: 1;
        color: var(--color-text-primary);
    }

    .cta-subtitle {
        font-family: var(--font-body);
        font-size: 32px;
        font-weight: 500;
        line-height: 1.5;
        color: var(--color-text-muted);
        max-width: 800px;
    }

    .cta-follow {
        font-family: var(--font-body);
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--color-text-muted);
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="accent-line"></div>
    <div class="cta-headline">STAY TUNED FOR MORE ANALYSIS</div>
    <div class="cta-subtitle">
        More deep dives into the data behind the professional windsurf tour
    </div>
    <div class="accent-line"></div>
    <div class="cta-follow">Follow @windsurfworldtourstats</div>
</div>
{% endblock %}
