{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 48px 64px;
        gap: 16px;
    }

    .feature-number {
        font-family: var(--font-display);
        font-size: 220px;
        letter-spacing: 0.04em;
        line-height: 1;
        color: rgba(255, 255, 255, 0.06);
        margin-bottom: -10px;
    }

    .feature-title {
        font-family: var(--font-display);
        font-size: 100px;
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--color-text-primary);
        margin-bottom: 16px;
    }

    .cta-accent-line {
        margin: 8px auto;
    }

    .feature-subtitle {
        font-family: var(--font-body);
        font-size: 40px;
        font-weight: 400;
        color: var(--color-text-muted);
        letter-spacing: 0.04em;
        line-height: 1.4;
        max-width: 800px;
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <div class="feature-number">{{ slide_number - 1 }}</div>
    <div class="feature-title">{{ title | upper }}</div>
    <div class="cta-accent-line"></div>
    <div class="feature-subtitle">{{ subtitle }}</div>
</div>
{% endblock %}
