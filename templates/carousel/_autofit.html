<script>
document.fonts.ready.then(() => {
    // Auto-fit single elements
    document.querySelectorAll('[data-autofit]').forEach(el => {
        const maxWidth = el.parentElement.offsetWidth;
        let size = parseInt(getComputedStyle(el).fontSize);
        while (el.scrollWidth > maxWidth && size > 40) {
            size -= 4;
            el.style.fontSize = size + 'px';
        }
    });

    // Auto-fit name groups — uniform size across both lines
    document.querySelectorAll('[data-autofit-group]').forEach(group => {
        const maxWidth = group.offsetWidth;
        const lines = group.querySelectorAll('[data-autofit-group] > *');
        if (!lines.length) return;
        const startSize = parseInt(getComputedStyle(lines[0]).fontSize);
        let size = startSize;

        for (const line of lines) {
            let s = startSize;
            line.style.fontSize = s + 'px';
            while (line.scrollWidth > maxWidth && s > 40) {
                s -= 4;
                line.style.fontSize = s + 'px';
            }
            size = Math.min(size, s);
        }

        for (const line of lines) {
            line.style.fontSize = size + 'px';
        }
    });
});
</script>
