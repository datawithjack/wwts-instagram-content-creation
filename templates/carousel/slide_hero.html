{% extends "base.html" %}

{% block head %}
<style>
    .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px 60px;
        position: relative;
        overflow: hidden;
    }

    .container::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(to top, {{ podium_colour.bg }}, transparent);
    }

    /* ── Hero-specific styles ── */
    .hero-title {
        font-family: var(--font-display);
        font-size: 80px;
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--color-text-primary);
        margin-bottom: 32px;
        position: relative;
    }

    .rank-badge {
        font-family: var(--font-display);
        font-size: 28px;
        letter-spacing: 0.15em;
        color: #F0C040;
        margin-bottom: 12px;
        padding: 8px 24px;
        border: 2px solid #F0C040;
        border-radius: 4px;
        position: relative;
    }

    .athlete-flag {
        margin-bottom: 16px;
        position: relative;
    }

    .athlete-flag img {
        width: 80px;
        height: 58px;
        object-fit: cover;
        border-radius: 4px;
    }

    .athlete-name {
        font-family: var(--font-display);
        font-size: 72px;
        letter-spacing: 0.04em;
        line-height: 0.95;
        margin-bottom: 24px;
        position: relative;
    }

    .score {
        font-family: var(--font-display);
        font-size: 140px;
        letter-spacing: 0.02em;
        line-height: 1;
        color: #F0C040;
        position: relative;
    }

    .score-label {
        font-family: var(--font-body);
        font-size: 20px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--color-text-muted);
        margin-top: 8px;
        position: relative;
    }

    .event-info {
        font-family: var(--font-body);
        font-size: 20px;
        color: var(--color-text-muted);
        letter-spacing: 0.05em;
        position: absolute;
        bottom: 40px;
    }

    .event-info .round {
        color: {% if discipline == 'jumps' %}#F0C040{% else %}#00D4FF{% endif %};
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="hero-title">{{ title }}</div>
    <div class="rank-badge">#1</div>
    <div class="athlete-flag"><img src="https://flagcdn.com/w120/{{ row.country | lower }}.png" alt="{{ row.country }}"></div>
    <div class="athlete-name">{{ row.athlete | upper }}</div>
    <div class="score">{{ "%.2f" | format(row.score) }}</div>
    <div class="score-label">{{ title_metric | upper }} Score</div>
    <div class="event-info">
        {% if not is_per_event %}{{ row.event }} · {% endif %}<span class="round">{{ row.round }}</span>
    </div>
</div>
{% endblock %}
