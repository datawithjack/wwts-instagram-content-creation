{% extends "carousel/base_carousel.html" %}

{% block carousel_head %}
<style>
    .container {
        align-items: stretch;
        justify-content: flex-start;
        text-align: center;
        padding: 64px 64px 80px;
        gap: 0;
    }

    .eyebrow-event {
        font-family: var(--font-body);
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.10em;
        color: var(--color-discipline);
        margin-bottom: 12px;
    }

    .slide-title {
        font-size: 100px;
        margin-bottom: 48px;
    }

    .stats-grid {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        padding: 0 16px;
    }

    .stat-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        background: rgba(30, 41, 59, 0.4);
        border: 1px solid rgba(51, 65, 85, 0.5);
        border-radius: 12px;
    }

    .stat-value {
        font-family: var(--font-display);
        font-size: 80px;
        letter-spacing: 0.03em;
        color: var(--color-text-primary);
        line-height: 1;
    }

    .stat-label {
        font-family: var(--font-body);
        font-size: 20px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-muted);
        margin-top: 8px;
    }

    .stat-detail {
        font-family: var(--font-body);
        font-size: 16px;
        color: var(--color-discipline);
        margin-top: 4px;
    }
</style>
{% endblock %}

{% block carousel_content %}
<div class="container">
    <!-- Event eyebrow -->
    <div class="eyebrow-event">{{ event_name | upper }}</div>

    <!-- Athlete surname as title -->
    <div class="slide-title">{{ athlete_surname }}</div>

    <!-- Stats grid -->
    <div class="stats-grid">
        {% for stat in stats %}
        <div class="stat-card">
            <div class="stat-value">{{ stat.value }}</div>
            <div class="stat-label">{{ stat.label }}</div>
            {% if stat.detail %}
            <div class="stat-detail">{{ stat.detail }}</div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
